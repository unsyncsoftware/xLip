<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bio | xlip.uk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #b8d900;
      --navy:   #0e1628;
      --navy-light: #152035;
      --navy-border: #1e2d47;
      --text:   #cdd8f0;
      --text-dim: #5a6a85;
    }

    html, body {
      min-height: 100%;
      background: var(--navy);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
    }

    .profile {
      width: 100%;
      max-width: 480px;
      animation: fadeUp 0.4s ease both;
    }

    /* ── AVATAR ── */
    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--accent);
    }

    .avatar-placeholder {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--navy-light);
      border: 3px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    /* ── NAME & BIO ── */
    .display-name {
      font-family: 'Space Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .bio-text {
      font-size: 14px;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.7;
      font-weight: 300;
      margin-bottom: 20px;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── SOCIALS ── */
    .socials {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 1px solid var(--navy-border);
      background: var(--navy-light);
      color: var(--text-dim);
      text-decoration: none;
      font-size: 12px;
      font-weight: 400;
      transition: all 0.15s;
    }

    .social-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── LINKS ── */
    .links { display: flex; flex-direction: column; gap: 12px; }

    .link-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--navy-light);
      border: 1px solid var(--navy-border);
      padding: 14px 16px;
      text-decoration: none;
      transition: all 0.2s;
      animation: fadeUp 0.4s ease both;
      position: relative;
      overflow: hidden;
    }

    .link-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transition: transform 0.2s;
    }

    .link-card:hover {
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .link-card:hover::before { transform: scaleY(1); }

    .link-thumb {
      width: 48px;
      height: 48px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--navy-border);
    }

    .link-thumb-placeholder {
      width: 48px;
      height: 48px;
      background: var(--navy-border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .link-info { flex: 1; min-width: 0; }

    .link-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-arrow {
      color: var(--accent);
      font-size: 16px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    .link-card:hover .link-arrow { transform: translateX(4px); }

    /* ── FOOTER ── */
    .bio-footer {
      margin-top: 40px;
      text-align: center;
    }

    .powered-by {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }

    .powered-by:hover { color: var(--accent); }

    .powered-by span { color: var(--accent); }

    /* ── NOT FOUND ── */
    .not-found {
      text-align: center;
      padding-top: 80px;
    }

    .not-found h1 {
      font-family: 'Space Mono', monospace;
      font-size: 48px;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .not-found p {
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .not-found a {
      color: var(--accent);
      text-decoration: none;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div id="profile-container" class="profile" style="display:none"></div>

  <div id="not-found" class="not-found" style="display:none">
    <h1>404</h1>
    <p>This bio page doesn't exist.</p>
    <a href="/">← go to xlip.uk</a>
  </div>

  <script>
    const username = window.location.pathname.replace('/', '').split('/')[0];

    async function loadBio() {
      const res = await fetch(`/api/bio/${username}`);

      if (!res.ok) {
        document.getElementById('not-found').style.display = 'block';
        return;
      }

      const data = await res.json();

      // Update page title and meta
      document.title = `${data.display_name || data.username} | xlip.uk`;

      // Set accent color
      document.documentElement.style.setProperty('--accent', data.accent_color || '#b8d900');

      const container = document.getElementById('profile-container');
      container.style.display = 'block';

      // Social links map
      const socialMap = [
        { key: 'instagram', icon: '📸', label: 'Instagram', url: 'https://instagram.com/' },
        { key: 'twitter',   icon: '𝕏',  label: 'Twitter',   url: 'https://twitter.com/' },
        { key: 'tiktok',    icon: '🎵', label: 'TikTok',    url: 'https://tiktok.com/@' },
        { key: 'youtube',   icon: '▶️', label: 'YouTube',   url: 'https://youtube.com/@' },
        { key: 'facebook',  icon: '📘', label: 'Facebook',  url: 'https://facebook.com/' },
      ];

      const activeSocials = socialMap.filter(s => data[s.key]);

      container.innerHTML = `
        <div class="avatar-wrap">
          ${data.avatar_url
            ? `<img src="${data.avatar_url}" class="avatar" alt="${data.display_name || data.username}">`
            : `<div class="avatar-placeholder">👤</div>`}
        </div>

        <div class="display-name">${data.display_name || data.username}</div>

        ${data.bio ? `<div class="bio-text">${data.bio}</div>` : ''}

        ${activeSocials.length ? `
          <div class="socials">
            ${activeSocials.map(s => `
              <a href="${s.url}${data[s.key]}" class="social-btn" target="_blank" rel="noopener">
                ${s.icon} ${s.label}
              </a>
            `).join('')}
          </div>
        ` : ''}

        <div class="links">
          ${data.links.map((link, i) => `
            <a href="/api/bio/click/${link.id}" class="link-card" target="_blank" rel="noopener"
               style="animation-delay:${i * 0.05}s">
              ${link.image_url
                ? `<img src="${link.image_url}" class="link-thumb" alt="${link.title}">`
                : `<div class="link-thumb-placeholder">🔗</div>`}
              <div class="link-info">
                <div class="link-title">${link.title}</div>
              </div>
              <div class="link-arrow">→</div>
            </a>
          `).join('')}
        </div>

        <div class="bio-footer">
          <div id="owner-edit-btn" style="display:none; margin-bottom:16px;">
            <a href="/bio-edit.html" style="
              display:inline-block;
              background: var(--accent);
              color: #0e1628;
              font-family: 'DM Sans', sans-serif;
              font-size: 12px;
              font-weight: 500;
              padding: 8px 20px;
              text-decoration: none;
            ">edit bio</a>
          </div>
          <a href="/" class="powered-by">powered by <span>xlip</span>.uk</a>
        </div>
      `;
    }

    loadBio();

    // Show edit button if this is the owner
    async function checkOwner() {
      const token = localStorage.getItem('xlip_token');
      if (!token) return;
      const res = await fetch('/api/bio/profile', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) return;
      const profile = await res.json();
      if (profile && profile.username === username) {
        document.getElementById('owner-edit-btn').style.display = 'block';
      }
    }

    checkOwner();
  </script>

</body>
</html>
