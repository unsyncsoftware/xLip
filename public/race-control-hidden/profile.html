<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xlip.uk | Client Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0e1628; --navy-light: #152035; --navy-border: #1e2d47;
      --lime: #b8d900; --lime-dark: #9ab800;
      --text: #cdd8f0; --text-dim: #5a6a85; --text-muted: #7a8fa8;
      --error: #e05a5a; --success: #4caf7d; --warn: #f59e0b; --gold: #f0a500;
    }
    html, body { min-height: 100%; background: var(--navy); color: var(--text); font-family: 'DM Sans', sans-serif; }

    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 40px; border-bottom: 1px solid var(--navy-border);
      position: sticky; top: 0; background: var(--navy); z-index: 100;
    }
    .logo { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; color: var(--lime); }
    .logo span { color: var(--text); }
    .logo small { color: var(--text-muted); font-size: 10px; margin-left: 8px; letter-spacing: 0.1em; }
    .back-btn { background: none; border: 1px solid var(--navy-border); color: var(--text-muted); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 16px; cursor: pointer; transition: all 0.15s; text-decoration: none; display: inline-block; }
    .back-btn:hover { border-color: var(--lime); color: var(--lime); }

    .page { padding: 28px 40px 60px; max-width: 1200px; margin: 0 auto; }

    .profile-header {
      background: var(--navy-light); border: 1px solid var(--navy-border);
      border-top: 2px solid var(--lime); padding: 24px 28px;
      display: flex; justify-content: space-between; align-items: flex-start;
      flex-wrap: wrap; gap: 20px; margin-bottom: 20px;
    }
    .profile-email { font-family: 'Space Mono', monospace; font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .profile-meta { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .profile-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .info-card { background: var(--navy-light); border: 1px solid var(--navy-border); padding: 16px; }
    .info-label { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
    .info-value { font-family: 'Space Mono', monospace; font-size: 16px; color: var(--lime); font-weight: 700; }
    .info-value.normal { font-size: 13px; color: var(--text); font-weight: 400; }

    .section-title { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; margin-top: 24px; padding-bottom: 8px; border-bottom: 1px solid var(--navy-border); }

    .table-wrap { background: var(--navy-light); border: 1px solid var(--navy-border); overflow-x: auto; margin-bottom: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead tr { border-bottom: 1px solid var(--navy-border); }
    th { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; padding: 10px 14px; text-align: left; font-weight: 400; background: var(--navy); }
    td { padding: 10px 14px; border-bottom: 1px solid var(--navy-border); color: var(--text-dim); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .mono { font-family: 'Space Mono', monospace; font-size: 11px; }
    .lime { color: var(--lime); }
    .dim { color: var(--text-muted); font-size: 11px; }
    .truncate { max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .badge { display: inline-block; font-family: 'Space Mono', monospace; font-size: 9px; padding: 2px 8px; letter-spacing: 0.08em; text-transform: uppercase; }
    .badge-green { background: rgba(76,175,125,0.15); color: var(--success); border: 1px solid rgba(76,175,125,0.3); }
    .badge-red { background: rgba(224,90,90,0.15); color: var(--error); border: 1px solid rgba(224,90,90,0.3); }
    .badge-lime { background: rgba(184,217,0,0.1); color: var(--lime); border: 1px solid rgba(184,217,0,0.3); }
    .badge-gray { background: rgba(90,106,133,0.15); color: var(--text-dim); border: 1px solid var(--navy-border); }
    .badge-warn { background: rgba(245,158,11,0.15); color: var(--warn); border: 1px solid rgba(245,158,11,0.3); }
    .badge-gold { background: rgba(240,165,0,0.15); color: var(--gold); border: 1px solid rgba(240,165,0,0.3); }

    .action-btn { font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; padding: 8px 16px; cursor: pointer; border: 1px solid; background: transparent; transition: all 0.15s; }
    .btn-nuke { color: var(--error); border-color: var(--error); }
    .btn-nuke:hover { background: var(--error); color: white; }
    .btn-ban { color: var(--warn); border-color: var(--warn); }
    .btn-ban:hover { background: var(--warn); color: var(--navy); }
    .btn-unban { color: var(--success); border-color: var(--success); }
    .btn-unban:hover { background: var(--success); color: white; }

    .plan-select { background: var(--navy); border: 1px solid var(--navy-border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 8px 12px; outline: none; cursor: pointer; }
    .plan-select:focus { border-color: var(--lime); }

    .empty { font-size: 12px; color: var(--text-muted); padding: 20px; text-align: center; }

    .geo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
    .geo-item { background: var(--navy-light); border: 1px solid var(--navy-border); padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
    .geo-place { font-size: 12px; color: var(--text); }
    .geo-count { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--lime); }
  </style>
</head>
<body>

  <header>
    <div class="logo">xlip<span>.uk</span><small>/ client profile</small></div>
    <a href="index.html" class="back-btn">← back to admin</a>
  </header>

  <div class="page" id="profile-page">
    <div style="text-align:center; padding:60px; color:var(--text-muted);">Loading profile...</div>
  </div>

  <script>
    const token = localStorage.getItem('xlip_admin_token') || localStorage.getItem('xlip_token');
    if (!token) window.location.href = 'login.html';
    const auth = { 'Authorization': `Bearer ${token}` };

    const params = new URLSearchParams(window.location.search);
    const userId = params.get('id');
    if (!userId) window.location.href = 'index.html';

    function planBadge(plan) {
      if (plan === 'promax') return '<span class="badge badge-gold">Pro Max</span>';
      if (plan === 'pro') return '<span class="badge badge-lime">Pro</span>';
      return '<span class="badge badge-gray">Free</span>';
    }

    async function loadProfile() {
      const res = await fetch(`/api/admin/client/${userId}`, { headers: auth });
      if (!res.ok) { document.getElementById('profile-page').innerHTML = '<div class="empty">Failed to load profile.</div>'; return; }
      const data = await res.json();
      const u = data.user;

      document.getElementById('profile-page').innerHTML = `
        <div class="profile-header">
          <div>
            <div class="profile-email">${u.email}</div>
            <div class="profile-meta">
              ${planBadge(u.plan)}
              ${u.is_banned ? '<span class="badge badge-red">banned</span>' : u.is_admin ? '<span class="badge badge-lime">admin</span>' : u.is_verified ? '<span class="badge badge-green">active</span>' : '<span class="badge badge-gray">unverified</span>'}
              <span class="dim">joined ${new Date(u.created_at).toLocaleDateString()}</span>
              ${u.trial_ends_at ? `<span class="dim">trial ends ${new Date(u.trial_ends_at).toLocaleDateString()}</span>` : ''}
            </div>
          </div>
          <div class="profile-actions">
            <select class="plan-select" onchange="changePlan(this.value)">
              <option value="free" ${u.plan === 'free' ? 'selected' : ''}>Free</option>
              <option value="pro" ${u.plan === 'pro' ? 'selected' : ''}>Pro</option>
              <option value="promax" ${u.plan === 'promax' ? 'selected' : ''}>Pro Max</option>
            </select>
            ${u.is_banned
              ? `<button class="action-btn btn-unban" onclick="setBan(false)">Unban User</button>`
              : u.is_admin ? '' : `<button class="action-btn btn-ban" onclick="setBan(true)">Ban User</button>`
            }
            ${!u.is_admin ? `<button class="action-btn btn-nuke" onclick="deleteAccount()">Delete Account</button>` : ''}
          </div>
        </div>

        <div class="info-grid">
          <div class="info-card"><div class="info-label">Total Links</div><div class="info-value">${data.links.length}</div></div>
          <div class="info-card"><div class="info-label">Total Clicks</div><div class="info-value">${data.links.reduce((s, l) => s + parseInt(l.clicks || 0), 0)}</div></div>
          <div class="info-card"><div class="info-label">Bio Page</div><div class="info-value normal">${data.bio ? `<a href="https://xlip.uk/${data.bio.username}" target="_blank" style="color:var(--lime);">@${data.bio.username}</a>` : '—'}</div></div>
          <div class="info-card"><div class="info-label">Abuse Reports</div><div class="info-value ${data.abuse.length > 0 ? '' : ''}">${data.abuse.length}</div></div>
        </div>

        <div class="section-title">Links (${data.links.length})</div>
        ${data.links.length ? `
        <div class="table-wrap">
          <table>
            <thead><tr><th>Short Link</th><th>Destination</th><th style="text-align:center">Clicks</th><th>Created</th><th style="text-align:right">Action</th></tr></thead>
            <tbody>
              ${data.links.map(l => `
                <tr>
                  <td class="mono lime">/${l.custom_alias || l.short_code}</td>
                  <td class="truncate dim">${l.long_url}</td>
                  <td style="text-align:center" class="mono">${l.clicks}</td>
                  <td class="dim">${new Date(l.created_at).toLocaleDateString()}</td>
                  <td style="text-align:right"><button class="action-btn btn-nuke" style="font-size:10px;padding:4px 8px;" onclick="nukeLink(${l.id})">nuke</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>` : '<div class="empty">No links yet.</div>'}

        <div class="section-title">Click Analytics by Location</div>
        ${data.analytics.length ? `
        <div class="geo-grid">
          ${data.analytics.map(a => `
            <div class="geo-item">
              <span class="geo-place">${a.city ? `${a.city}, ` : ''}${a.country}</span>
              <span class="geo-count">${a.clicks}</span>
            </div>
          `).join('')}
        </div>` : '<div class="empty">No location data yet.</div>'}

        ${data.abuse.length ? `
        <div class="section-title">Abuse Reports (${data.abuse.length})</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Short Code</th><th>Destination</th><th>Reporter IP</th><th>Status</th><th>Reported</th></tr></thead>
            <tbody>
              ${data.abuse.map(r => `
                <tr>
                  <td class="mono lime">${r.short_code || '—'}</td>
                  <td class="truncate dim">${r.long_url || '—'}</td>
                  <td class="mono dim">${r.reporter_ip}</td>
                  <td><span class="badge ${r.status === 'pending' ? 'badge-warn' : 'badge-gray'}">${r.status}</span></td>
                  <td class="dim">${new Date(r.reported_at).toLocaleString()}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>` : ''}
      `;
    }

    async function changePlan(plan) {
      await fetch(`/api/admin/client/${userId}/plan`, {
        method: 'PATCH',
        headers: { ...auth, 'Content-Type': 'application/json' },
        body: JSON.stringify({ plan })
      });
      alert(`Plan updated to ${plan}`);
    }

    async function setBan(banned) {
      if (!confirm(banned ? 'Ban this user?' : 'Unban this user?')) return;
      await fetch(`/api/admin/users/${userId}/ban`, {
        method: 'PATCH',
        headers: { ...auth, 'Content-Type': 'application/json' },
        body: JSON.stringify({ banned })
      });
      loadProfile();
    }

    async function deleteAccount() {
      if (!confirm('DELETE this account and all their data? This cannot be undone.')) return;
      if (!confirm('Are you absolutely sure?')) return;
      await fetch(`/api/admin/client/${userId}`, { method: 'DELETE', headers: auth });
      window.location.href = 'index.html';
    }

    async function nukeLink(id) {
      if (!confirm('Delete this link?')) return;
      await fetch(`/api/admin/nuke/${id}`, { method: 'DELETE', headers: auth });
      loadProfile();
    }

    loadProfile();
  </script>
</body>
</html>
